naftiko: 1.0.0-alpha2
info:
  label: elastic.io Platform REST API — Subscriptions
  description: 'elastic.io Platform REST API — Subscriptions. 4 operations. Lead operation: Elastic.io List subscriptions.
    Self-contained Naftiko capability covering one Elastic Io business surface.'
  tags:
  - Elastic Io
  - Subscriptions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELASTIC_IO_API_KEY: ELASTIC_IO_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-subscriptions
    baseUri: https://api.elastic.io/v2
    description: elastic.io Platform REST API — Subscriptions business capability. Self-contained, no shared references.
    resources:
    - name: subscriptions
      path: /subscriptions
      operations:
      - name: listsubscriptions
        method: GET
        description: Elastic.io List subscriptions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsubscription
        method: POST
        description: Elastic.io Create a subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: subscriptions-subscription_id
      path: /subscriptions/{subscription_id}
      operations:
      - name: getsubscription
        method: GET
        description: Elastic.io Get a subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscription_id
          in: path
          type: string
          required: true
      - name: deletesubscription
        method: DELETE
        description: Elastic.io Delete a subscription
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscription_id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.ELASTIC_IO_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-subscriptions-rest
    port: 8080
    description: REST adapter for elastic.io Platform REST API — Subscriptions. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/subscriptions
      name: subscriptions
      description: REST surface for subscriptions.
      operations:
      - method: GET
        name: listsubscriptions
        description: Elastic.io List subscriptions
        call: platform-subscriptions.listsubscriptions
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsubscription
        description: Elastic.io Create a subscription
        call: platform-subscriptions.createsubscription
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/subscriptions/{subscription-id}
      name: subscriptions-subscription-id
      description: REST surface for subscriptions-subscription_id.
      operations:
      - method: GET
        name: getsubscription
        description: Elastic.io Get a subscription
        call: platform-subscriptions.getsubscription
        with:
          subscription_id: rest.subscription_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesubscription
        description: Elastic.io Delete a subscription
        call: platform-subscriptions.deletesubscription
        with:
          subscription_id: rest.subscription_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-subscriptions-mcp
    port: 9090
    transport: http
    description: MCP adapter for elastic.io Platform REST API — Subscriptions. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: elastic-io-list-subscriptions
      description: Elastic.io List subscriptions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-subscriptions.listsubscriptions
      outputParameters:
      - type: object
        mapping: $.
    - name: elastic-io-create-subscription
      description: Elastic.io Create a subscription
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-subscriptions.createsubscription
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: elastic-io-get-subscription
      description: Elastic.io Get a subscription
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-subscriptions.getsubscription
      with:
        subscription_id: tools.subscription_id
      outputParameters:
      - type: object
        mapping: $.
    - name: elastic-io-delete-subscription
      description: Elastic.io Delete a subscription
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: platform-subscriptions.deletesubscription
      with:
        subscription_id: tools.subscription_id
      outputParameters:
      - type: object
        mapping: $.
