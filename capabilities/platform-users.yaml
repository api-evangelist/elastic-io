    baseUri: https://api.elastic.io/v2
    description: elastic.io Platform REST API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users-me
      path: /users/me
      operations:
      - name: getcurrentuser
        method: GET
        description: Elastic.io Get current user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatecurrentuser
        method: PATCH
        description: Elastic.io Update current user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: users-user_id
      path: /users/{user_id}
      operations:
      - name: getuser
        method: GET
        description: Elastic.io Get a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ELASTIC_IO_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-users-rest
    port: 8080
    description: REST adapter for elastic.io Platform REST API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/users/me
      name: users-me
      description: REST surface for users-me.
      operations:
      - method: GET
        name: getcurrentuser
        description: Elastic.io Get current user
        call: platform-users.getcurrentuser
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatecurrentuser
        description: Elastic.io Update current user
        call: platform-users.updatecurrentuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{user-id}
      name: users-user-id
      description: REST surface for users-user_id.
      operations:
      - method: GET
        name: getuser
        description: Elastic.io Get a user
        call: platform-users.getuser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for elastic.io Platform REST API — Users. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: elastic-io-get-current-user
      description: Elastic.io Get current user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-users.getcurrentuser
      outputParameters:
      - type: object
        mapping: $.
    - name: elastic-io-update-current-user
      description: Elastic.io Update current user
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: platform-users.updatecurrentuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: elastic-io-get-user
      description: Elastic.io Get a user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-users.getuser
      outputParameters:
      - type: object
        mapping: $.
