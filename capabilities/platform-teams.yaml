naftiko: 1.0.0-alpha2
info:
  label: elastic.io Platform REST API — Teams
  description: 'elastic.io Platform REST API — Teams. 4 operations. Lead operation: Elastic.io List teams. Self-contained
    Naftiko capability covering one Elastic Io business surface.'
  tags:
  - Elastic Io
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ELASTIC_IO_API_KEY: ELASTIC_IO_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-teams
    baseUri: https://api.elastic.io/v2
    description: elastic.io Platform REST API — Teams business capability. Self-contained, no shared references.
    resources:
    - name: teams
      path: /teams
      operations:
      - name: listteams
        method: GET
        description: Elastic.io List teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter[contract_id]
          in: query
          type: string
          description: Filter by contract ID
      - name: createteam
        method: POST
        description: Elastic.io Create a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: teams-team_id
      path: /teams/{team_id}
      operations:
      - name: getteam
        method: GET
        description: Elastic.io Get a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteteam
        method: DELETE
        description: Elastic.io Delete a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ELASTIC_IO_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-teams-rest
    port: 8080
    description: REST adapter for elastic.io Platform REST API — Teams. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/teams
      name: teams
      description: REST surface for teams.
      operations:
      - method: GET
        name: listteams
        description: Elastic.io List teams
        call: platform-teams.listteams
        with:
          filter[contract_id]: rest.filter[contract_id]
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createteam
        description: Elastic.io Create a team
        call: platform-teams.createteam
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/teams/{team-id}
      name: teams-team-id
      description: REST surface for teams-team_id.
      operations:
      - method: GET
        name: getteam
        description: Elastic.io Get a team
        call: platform-teams.getteam
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteteam
        description: Elastic.io Delete a team
        call: platform-teams.deleteteam
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for elastic.io Platform REST API — Teams. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: elastic-io-list-teams
      description: Elastic.io List teams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-teams.listteams
      with:
        filter[contract_id]: tools.filter[contract_id]
      outputParameters:
      - type: object
        mapping: $.
    - name: elastic-io-create-team
      description: Elastic.io Create a team
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-teams.createteam
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: elastic-io-get-team
      description: Elastic.io Get a team
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-teams.getteam
      outputParameters:
      - type: object
        mapping: $.
    - name: elastic-io-delete-team
      description: Elastic.io Delete a team
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: platform-teams.deleteteam
      outputParameters:
      - type: object
        mapping: $.
